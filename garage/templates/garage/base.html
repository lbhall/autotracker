{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AutoTracker{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--card); padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; }
    header a { color:var(--accent); text-decoration:none; font-weight:600; }
    header .brand { font-size:1.25rem; }
    main { max-width:760px; margin:2rem auto; padding:0 1.5rem; }
    .card { background:var(--card); border-radius:12px; padding:1.25rem 1.5rem; margin-bottom:1rem; }
    .card a { color:var(--text); text-decoration:none; }
    h1 { margin-top:0; }
    .muted { color:var(--muted); }
    .btn { display:inline-block; background:var(--accent); color:#0f172a; padding:.6rem 1rem; border-radius:8px; border:none; font-weight:600; cursor:pointer; text-decoration:none; }
    .btn.secondary { background:transparent; color:var(--accent); border:1px solid var(--accent); }
    form p { margin:.75rem 0; display:flex; flex-direction:column; gap:.25rem; }
    input, textarea, select { padding:.5rem; border-radius:6px; border:1px solid #334155; background:#0f172a; color:var(--text); font:inherit; }
    label { font-weight:600; }
    .row { display:flex; gap:.75rem; align-items:center; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:.5rem; border-bottom:1px solid #334155; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{% url 'garage:garage' %}">🚗 AutoTracker</a>
    <nav>
      {% if user.is_authenticated %}
        <span class="muted">{{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">{% csrf_token %}<button class="btn secondary" type="submit">Log out</button></form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
