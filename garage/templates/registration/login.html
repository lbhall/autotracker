{% extends "garage/base.html" %}
{% block title %}Log in · AutoTracker{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <div class="card">
    {% if form.errors %}<p class="muted">Your username and password didn't match. Please try again.</p>{% endif %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Log in</button>
    </form>
    <p class="muted" style="margin-top:1rem;">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
  </div>
{% endblock %}
